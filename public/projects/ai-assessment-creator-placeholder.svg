<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1117;stop-opacity:1" />
    </linearGradient>

    <!-- Blue glow gradient for document panel -->
    <linearGradient id="docPanelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.04" />
    </linearGradient>

    <!-- Cyan glow gradient for quiz panel -->
    <linearGradient id="quizPanelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.04" />
    </linearGradient>

    <!-- AI arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>

    <!-- Dot pattern -->
    <pattern id="dotPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#3b82f6" opacity="0.18" />
    </pattern>

    <!-- Glow filter for blue elements -->
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip path for panels -->
    <clipPath id="docClip">
      <rect x="50" y="60" width="280" height="330" rx="8" />
    </clipPath>
    <clipPath id="quizClip">
      <rect x="470" y="60" width="280" height="330" rx="8" />
    </clipPath>

    <!-- Animation for streaming dots -->
    <style>
      .dot1 { animation: pulse 1.6s ease-in-out infinite; }
      .dot2 { animation: pulse 1.6s ease-in-out 0.32s infinite; }
      .dot3 { animation: pulse 1.6s ease-in-out 0.64s infinite; }
      .progress-bar { animation: progressGrow 2.4s ease-in-out infinite; }
      .arrow-flow { animation: flowPulse 2s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 0.2; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1); }
      }
      @keyframes progressGrow {
        0% { width: 10px; opacity: 0.4; }
        60% { width: 120px; opacity: 1; }
        100% { width: 120px; opacity: 0.4; }
      }
      @keyframes flowPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Base background -->
  <rect width="800" height="450" fill="url(#bgGradient)" />

  <!-- Dot grid background -->
  <rect width="800" height="450" fill="url(#dotPattern)" />

  <!-- Ambient blue glow left -->
  <ellipse cx="190" cy="225" rx="180" ry="140" fill="#3b82f6" opacity="0.04" />
  <!-- Ambient cyan glow right -->
  <ellipse cx="610" cy="225" rx="180" ry="140" fill="#22d3ee" opacity="0.04" />

  <!-- ============================================ -->
  <!-- DOCUMENT PANEL (LEFT) -->
  <!-- ============================================ -->
  <rect x="50" y="60" width="280" height="330" rx="8" fill="url(#docPanelGrad)" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3" />

  <!-- Panel header bar -->
  <rect x="50" y="60" width="280" height="38" rx="8" fill="#3b82f6" fill-opacity="0.12" />
  <rect x="50" y="86" width="280" height="12" fill="#3b82f6" fill-opacity="0.12" />

  <!-- Header dots (traffic lights) -->
  <circle cx="76" cy="79" r="5" fill="#3b82f6" opacity="0.5" />
  <circle cx="94" cy="79" r="5" fill="#3b82f6" opacity="0.3" />
  <circle cx="112" cy="79" r="5" fill="#3b82f6" opacity="0.2" />

  <!-- Header title bar -->
  <rect x="130" y="74" width="100" height="10" rx="3" fill="#3b82f6" opacity="0.25" />

  <!-- Document content lines -->
  <!-- Title line -->
  <rect x="72" y="112" width="180" height="10" rx="3" fill="#3b82f6" opacity="0.55" />
  <!-- Subtitle -->
  <rect x="72" y="130" width="120" height="7" rx="2" fill="#3b82f6" opacity="0.3" />

  <!-- Divider -->
  <line x1="72" y1="148" x2="308" y2="148" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.2" />

  <!-- Body text lines -->
  <rect x="72" y="160" width="224" height="6" rx="2" fill="#ffffff" opacity="0.12" />
  <rect x="72" y="173" width="210" height="6" rx="2" fill="#ffffff" opacity="0.10" />
  <rect x="72" y="186" width="224" height="6" rx="2" fill="#ffffff" opacity="0.12" />
  <rect x="72" y="199" width="180" height="6" rx="2" fill="#ffffff" opacity="0.08" />

  <!-- Section break -->
  <rect x="72" y="216" width="224" height="6" rx="2" fill="#ffffff" opacity="0.12" />
  <rect x="72" y="229" width="198" height="6" rx="2" fill="#ffffff" opacity="0.10" />
  <rect x="72" y="242" width="224" height="6" rx="2" fill="#ffffff" opacity="0.12" />
  <rect x="72" y="255" width="140" height="6" rx="2" fill="#ffffff" opacity="0.08" />

  <!-- Highlighted text block -->
  <rect x="72" y="270" width="224" height="24" rx="3" fill="#3b82f6" opacity="0.10" />
  <rect x="80" y="278" width="160" height="6" rx="2" fill="#3b82f6" opacity="0.45" />

  <!-- More body lines -->
  <rect x="72" y="306" width="224" height="6" rx="2" fill="#ffffff" opacity="0.10" />
  <rect x="72" y="319" width="190" height="6" rx="2" fill="#ffffff" opacity="0.08" />
  <rect x="72" y="332" width="224" height="6" rx="2" fill="#ffffff" opacity="0.10" />

  <!-- Document page corner fold -->
  <polygon points="308,60 308,80 288,60" fill="#3b82f6" opacity="0.2" />
  <line x1="288" y1="60" x2="308" y2="80" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.4" />

  <!-- ============================================ -->
  <!-- CENTER AI TRANSFORM AREA -->
  <!-- ============================================ -->

  <!-- AI node circle -->
  <circle cx="400" cy="225" r="36" fill="#0c0c0f" stroke-opacity="0" />
  <circle cx="400" cy="225" r="36" fill="url(#arrowGrad)" opacity="0.08" />
  <circle cx="400" cy="225" r="36" stroke="url(#arrowGrad)" stroke-width="1.5" fill="none" opacity="0.7" filter="url(#blueGlow)" />

  <!-- Inner circle -->
  <circle cx="400" cy="225" r="26" stroke="url(#arrowGrad)" stroke-width="0.5" fill="none" opacity="0.35" />

  <!-- AI label -->
  <text x="400" y="220" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" font-weight="600" fill="url(#arrowGrad)" opacity="0.9" letter-spacing="1">AI</text>
  <text x="400" y="233" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="7" fill="#22d3ee" opacity="0.6" letter-spacing="0.5">GEN</text>

  <!-- Left arrow connector -->
  <line x1="330" y1="225" x2="364" y2="225" stroke="url(#arrowGrad)" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3" />
  <polygon points="362,220 372,225 362,230" fill="#3b82f6" opacity="0.7" />

  <!-- Right arrow connector -->
  <line x1="436" y1="225" x2="470" y2="225" stroke="url(#arrowGrad)" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3" />
  <polygon points="468,220 478,225 468,230" fill="#22d3ee" opacity="0.7" />

  <!-- Streaming indicator dots below AI node -->
  <g transform="translate(400, 272)">
    <circle class="dot1" cx="-12" cy="0" r="3.5" fill="#3b82f6" />
    <circle class="dot2" cx="0" cy="0" r="3.5" fill="url(#arrowGrad)" />
    <circle class="dot3" cx="12" cy="0" r="3.5" fill="#22d3ee" />
  </g>

  <!-- Progress bar below dots -->
  <rect x="350" y="288" width="100" height="2" rx="1" fill="#ffffff" opacity="0.08" />
  <rect x="350" y="288" height="2" rx="1" fill="url(#arrowGrad)" opacity="0.7" class="progress-bar" />

  <!-- ============================================ -->
  <!-- QUIZ PANEL (RIGHT) -->
  <!-- ============================================ -->
  <rect x="470" y="60" width="280" height="330" rx="8" fill="url(#quizPanelGrad)" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3" />

  <!-- Panel header bar -->
  <rect x="470" y="60" width="280" height="38" rx="8" fill="#22d3ee" fill-opacity="0.1" />
  <rect x="470" y="86" width="280" height="12" fill="#22d3ee" fill-opacity="0.1" />

  <!-- Header dots -->
  <circle cx="496" cy="79" r="5" fill="#22d3ee" opacity="0.5" />
  <circle cx="514" cy="79" r="5" fill="#22d3ee" opacity="0.3" />
  <circle cx="532" cy="79" r="5" fill="#22d3ee" opacity="0.2" />

  <!-- Header title -->
  <rect x="550" y="74" width="120" height="10" rx="3" fill="#22d3ee" opacity="0.25" />

  <!-- Quiz title -->
  <rect x="492" y="112" width="160" height="10" rx="3" fill="#22d3ee" opacity="0.55" />
  <rect x="492" y="130" width="100" height="7" rx="2" fill="#22d3ee" opacity="0.3" />

  <!-- Divider -->
  <line x1="492" y1="148" x2="728" y2="148" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.2" />

  <!-- Question 1 (Multiple choice) -->
  <rect x="492" y="160" width="216" height="7" rx="2" fill="#ffffff" opacity="0.14" />
  <rect x="492" y="172" width="180" height="6" rx="2" fill="#ffffff" opacity="0.10" />

  <!-- Radio buttons (multiple choice) -->
  <circle cx="504" cy="190" r="6" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.6" />
  <circle cx="504" cy="190" r="3" fill="#22d3ee" opacity="0.7" />
  <rect x="516" y="187" width="100" height="6" rx="2" fill="#ffffff" opacity="0.18" />

  <circle cx="504" cy="207" r="6" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.35" />
  <rect x="516" y="204" width="88" height="6" rx="2" fill="#ffffff" opacity="0.10" />

  <circle cx="504" cy="224" r="6" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.35" />
  <rect x="516" y="221" width="112" height="6" rx="2" fill="#ffffff" opacity="0.10" />

  <!-- Divider between questions -->
  <line x1="492" y1="240" x2="728" y2="240" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.12" />

  <!-- Question 2 (Checkboxes) -->
  <rect x="492" y="252" width="200" height="7" rx="2" fill="#ffffff" opacity="0.14" />
  <rect x="492" y="264" width="155" height="6" rx="2" fill="#ffffff" opacity="0.10" />

  <!-- Checkbox items -->
  <!-- Checked box 1 -->
  <rect x="498" y="277" width="12" height="12" rx="2" stroke="#22d3ee" stroke-width="1.5" fill="#22d3ee" fill-opacity="0.2" opacity="0.8" />
  <polyline points="501,283 504,286 508,280" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
  <rect x="517" y="280" width="96" height="6" rx="2" fill="#ffffff" opacity="0.18" />

  <!-- Checked box 2 -->
  <rect x="498" y="296" width="12" height="12" rx="2" stroke="#22d3ee" stroke-width="1.5" fill="#22d3ee" fill-opacity="0.2" opacity="0.8" />
  <polyline points="501,302 504,305 508,299" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
  <rect x="517" y="299" width="112" height="6" rx="2" fill="#ffffff" opacity="0.18" />

  <!-- Unchecked box 3 -->
  <rect x="498" y="315" width="12" height="12" rx="2" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.4" />
  <rect x="517" y="318" width="80" height="6" rx="2" fill="#ffffff" opacity="0.10" />

  <!-- Unchecked box 4 -->
  <rect x="498" y="334" width="12" height="12" rx="2" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.4" />
  <rect x="517" y="337" width="100" height="6" rx="2" fill="#ffffff" opacity="0.10" />

  <!-- Page corner fold -->
  <polygon points="750,60 750,80 730,60" fill="#22d3ee" opacity="0.18" />
  <line x1="730" y1="60" x2="750" y2="80" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.35" />

  <!-- ============================================ -->
  <!-- BOTTOM STATUS BAR -->
  <!-- ============================================ -->
  <rect x="50" y="406" width="700" height="24" rx="4" fill="#ffffff" fill-opacity="0.03" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.2" />

  <!-- Status label left -->
  <circle cx="68" cy="418" r="4" fill="#22d3ee" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
  </circle>
  <rect x="80" y="414" width="80" height="6" rx="2" fill="#22d3ee" opacity="0.35" />

  <!-- Middle metrics -->
  <rect x="240" y="414" width="60" height="6" rx="2" fill="#ffffff" opacity="0.12" />
  <rect x="320" y="414" width="60" height="6" rx="2" fill="#ffffff" opacity="0.12" />
  <rect x="400" y="414" width="60" height="6" rx="2" fill="#ffffff" opacity="0.12" />

  <!-- Right action indicator -->
  <rect x="620" y="413" width="60" height="9" rx="3" fill="#3b82f6" opacity="0.25" />
  <rect x="694" y="413" width="40" height="9" rx="3" fill="#22d3ee" opacity="0.2" />

  <!-- ============================================ -->
  <!-- DECORATIVE CORNER ACCENTS -->
  <!-- ============================================ -->
  <!-- Top-left corner accent -->
  <line x1="0" y1="20" x2="30" y2="20" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3" />
  <line x1="20" y1="0" x2="20" y2="30" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3" />

  <!-- Top-right corner accent -->
  <line x1="800" y1="20" x2="770" y2="20" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3" />
  <line x1="780" y1="0" x2="780" y2="30" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3" />

  <!-- Bottom-left corner accent -->
  <line x1="0" y1="430" x2="30" y2="430" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3" />
  <line x1="20" y1="420" x2="20" y2="450" stroke="#3b82f6" stroke-width="1" stroke-opacity="0.3" />

  <!-- Bottom-right corner accent -->
  <line x1="800" y1="430" x2="770" y2="430" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3" />
  <line x1="780" y1="420" x2="780" y2="450" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3" />
</svg>
